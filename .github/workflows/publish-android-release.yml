name: Publish Android Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Draft release tag to publish"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: windows-latest

    steps:
    - name: Publish release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release edit "${{ inputs.tag_name }}" --repo "${{ github.repository }}" --draft=false --prerelease=false