name: Build iOS Release IPA

on:
  workflow_dispatch:  # Allows manual trigger
  push:
    branches:
      - master
    paths:
      - 'ByteSheild/**'
      - '.github/workflows/build-ios-release.yml'

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore .NET workloads
      run: dotnet workload restore
    
    - name: Build iOS Release
      run: |
        cd ByteSheild
        dotnet publish -f net10.0-ios -c Release
      env:
        CI: true
    
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ByteShield-iOS-Release
        path: ByteSheild/bin/Release/net10.0-ios/**/*.ipa
        if-no-files-found: warn
    
    - name: Upload Build Output
      uses: actions/upload-artifact@v4
      with:
        name: iOS-Build-Output
        path: ByteSheild/bin/Release/net10.0-ios/
        if-no-files-found: warn
    
    - name: Create Release
      if: success()
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ios-release-${{ github.run_number }}
        release_name: iOS Release - Build ${{ github.run_number }}
        body: iOS IPA release build
        draft: false
        prerelease: true
